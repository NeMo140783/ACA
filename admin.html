<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Autonomix War Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --surface: #111111; --text: #f0f0f0; --accent: #b800e6; --border: #222222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem 5%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
        h1 span { color: var(--accent); }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #0a0a0a; color: #888; font-weight: 600; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status.pending { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }
        .status.completed { background: rgba(0, 230, 184, 0.2); color: #00e6b8; }
        .btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;}
        .btn:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Autonomix <span>War Room</span> (Admin)</h1>
        <div>Total MRR: <span style="color: #00e6b8; font-weight: bold;">$0.00</span></div>
    </div>

    <h3>Incoming Foundry Requests</h3>
    <table>
        <thead>
            <tr>
                <th>Client</th>
                <th>Request Title</th>
                <th>Submitted</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="requests-body"></tbody>
    </table>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
    async function fetchRequests() {
        const { data, error } = await supabaseClient
            .from('foundry_requests')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error('Error fetching requests:', error);
            return;
        }

        const tbody = document.getElementById('requests-body');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#888;">No incoming requests yet.</td></tr>';
            return;
        }

        data.forEach(req => {
            const statusClass = req.status === 'pending' ? 'status pending' : 'status completed';
            const tr = document.createElement('tr');
            tr.innerHTML = 
                <td> + req.user_id.substring(0,8) + ...</td>
                <td> + req.title + </td>
                <td> + new Date(req.created_at).toLocaleString() + </td>
                <td><span class=" + statusClass + "> + req.status.toUpperCase() + </span></td>
                <td>
                    <button class="btn" onclick="alert('Raw Data:\\n' + ' + req.description.replace(/'/g, "\\'") + ')">View Spec</button>
                     + (req.status === 'pending' ? <button class="btn" style="margin-left: 5px; border-color: #00e6b8; color: #00e6b8;" onclick="fulfillRequest(' + req.id + ')">Mark Completed</button> : `) + 
                </td>
            ;
            tbody.appendChild(tr);
        });
    }

    async function fulfillRequest(reqId) {
        // In a real automated backend, the AI agents would run, generate the code, and push it here.
        // For the manual Admin War Room UI, we simulate attaching the result.
        const mockEngineeredPrompt = SYSTEM DIRECTIVE: Custom Engineered Architecture.
        [Generated by Autonomix Foundry Agents based on client specs.]
        1. Initialize constraints.
        2. Execute step-by-step reasoning.
        3. Output final state.;

        const { error } = await supabaseClient
            .from('foundry_requests')
            .update({ status: 'completed', result: mockEngineeredPrompt })
            .eq('id', reqId);
            
        if(error) alert('Error: ' + error.message);
        else {
            alert('Request FULFILLED and delivered to client dashboard.');
            fetchRequests();
        }
    }

    document.addEventListener('DOMContentLoaded', fetchRequests);
</script>
</body>
</html>
